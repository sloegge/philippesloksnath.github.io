project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
  resources:
    - CNAME

website:
  title: "Philippe Sloksnath"
  site-url: "https://philippesloksnath.com"
  description: "Research & Teaching Assistant at the University of Zurich."
  open-graph:
    image: images/philippe.jpg
  twitter-card:
    image: images/philippe.jpg

  navbar:
    background: dark
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: research.qmd
        text: Research
      - href: contact.qmd
        text: Contact

  sidebar:
    style: docked
    search: false
    contents:
      - section: Research Interests
        expanded: true
        contents:
          - text: AI & persuasion
          - text: Media effects
          - text: Misinformation
          - text: Human–computer interaction
          - text: Open science
      - icon: file-earmark-person
        text: CV
        href: assets/cv.pdf
        target: _blank
    tools:
      - icon: envelope
        href: mailto:philippe.sloksnath@uzh.ch
        target: _blank
        aria-label: Email
      - icon: github
        href: https://github.com/sloegge
        target: _blank
        rel: noopener noreferrer
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/philippe-sloksnath
        target: _blank
        rel: noopener noreferrer
        aria-label: LinkedIn
      - icon: bluesky
        href: https://bsky.app/profile/philippesloksnath.bsky.social
        target: _blank
        rel: noopener noreferrer
        aria-label: Bluesky
      - icon: mortarboard
        href: https://scholar.google.com/citations?hl=de&user=80htikoAAAAJ
        target: _blank
        rel: noopener noreferrer
        aria-label: Google Scholar
      - icon: person-badge
        href: https://orcid.org/0009-0004-5792-6768
        target: _blank
        rel: noopener noreferrer
        aria-label: ORCID

format:
  html:
    theme: litera
    toc: false
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons@1.9.4/css/academicons.min.css">
        <link rel="stylesheet" href="styles.css">