project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - blog.qmd
  resources:
    - CNAME

website:
  title: "Philippe Sloksnath"
  site-url: "https://philippesloksnath.com"
  description: "Research & Teaching Assistant at the University of Zurich."
  open-graph:
    image: images/philippe.jpg
  twitter-card:
